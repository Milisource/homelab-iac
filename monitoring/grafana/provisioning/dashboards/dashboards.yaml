# Grafana dashboard provisioning provider
# Loads dashboard JSON definitions from the configured path

apiVersion: 1
providers:
  - name: Homelab
    orgId: 1
    folder: 
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
