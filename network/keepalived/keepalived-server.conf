# keepalived.conf — VRRP configuration for milis-wonderspace (server)
# Backup VIP holder (priority 50)
# Interface: enp2s0

vrrp_script chk_dns {
    script "/etc/keepalived/check_dns.sh"
    interval 2
    timeout 2
    rise 2
    fall 3
}

vrrp_instance dns_vip {
    state BACKUP
    interface enp2s0
    virtual_router_id 50
    priority 50
    advert_int 1
    preempt
    preempt_delay 10

    authentication {
        auth_type PASS
        auth_pass ${KEEPALIVED_AUTH_PASS}
    }

    virtual_ipaddress {
        192.168.50.99/24 dev enp2s0
    }

    track_script {
        chk_dns
    }
}
